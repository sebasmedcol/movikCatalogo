<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Digital — Servicios Web & Marketing</title>
<link rel="icon" href="favicon-rounded.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon-rounded.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #00C896;
    --accent-dark: #009E76;
    --accent-glow: rgba(0,200,150,0.15);
    --dark: #0A0A0F;
    --dark2: #111118;
    --dark3: #1A1A24;
    --dark4: #242432;
    --white: #FFFFFF;
    --off-white: #F5F5F0;
    --muted: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.08);
    /* Libro: tamaño base fijo, el escalado se manejará con JS/CSS transform */
    --page-w: 460px;
    --page-h: 660px;
    --body-bg: #060609;
    --book-shadow: rgba(0,0,0,0.8);
    --spine-mid: #1a1a2a;
    --checklist-fg: rgba(255,255,255,0.88);
  }

  html[data-theme="light"] {
    --accent: #008a68;
    --accent-dark: #006b50;
    --accent-glow: rgba(0,138,104,0.14);
    --dark: #F4F4F0;
    --dark2: #EBEBE6;
    --dark3: #E0E0DA;
    --dark4: #D0D0C8;
    --white: #0D0D12;
    --off-white: #1A1A22;
    --muted: rgba(13,13,18,0.72);
    --border: rgba(13,13,18,0.14);
    --checklist-fg: #24242e;
    --body-bg: #ECECE6;
    --book-shadow: rgba(0,0,0,0.18);
    --spine-mid: #c8c8c0;
  }

  body {
    background: var(--body-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.35s ease, color 0.35s ease;
  }

  /* TOP BAR */
  .topbar {
    width: 100%;
    max-width: 1400px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
  }
  .topbar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .brand-sub {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .theme-toggle-icon {
    font-size: 16px;
    line-height: 1;
  }
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--dark3);
    color: var(--white);
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: inherit;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .page-counter {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .page-counter span { color: var(--white); font-weight: 500; }

  /* STAGE & ZOOM WRAPPER */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 100vw;
    min-height: 0;
    position: relative;
    box-sizing: border-box;
  }
  .book-wrapper {
    flex: 1;
    width: 100%;
    height: 100%;
    overflow: auto;
    display: flex;
    cursor: grab;
    position: relative;
  }
  .book-wrapper:active { cursor: grabbing; }
  .book-scaler {
    margin: auto; /* Centers the scaler when smaller than wrapper */
    position: relative;
    /* Width and height applied by JS */
  }

  /* ZOOM CONTROLS */
  .zoom-controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    background: var(--dark3);
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  html[data-theme="light"] .zoom-controls {
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .zoom-btn {
    background: transparent;
    border: none;
    color: var(--white);
    font-size: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.1); }
  html[data-theme="light"] .zoom-btn:hover { background: rgba(0,0,0,0.08); }

  .stage-hint {
    margin: 0 auto 14px;
    max-width: min(760px, 92vw);
    text-align: center;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* BOOK */
  .book {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    width: calc(var(--page-w) * 2);
    height: var(--page-h);
    max-width: none;
    filter: drop-shadow(0 40px 80px var(--book-shadow));
    transform-style: preserve-3d;
    perspective: 2400px;
    user-select: none;
    touch-action: pan-y;
    transform-origin: top left;
  }
  .book input, .book textarea { cursor: text; }

  /* PAGES */
  .page {
    position: absolute;
    left: 0;
    top: 0;
    width: var(--page-w);
    height: var(--page-h);
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1.05s cubic-bezier(0.33, 1, 0.68, 1);
    will-change: transform;
  }
  .page.right-page {
    left: var(--page-w);
    transform-origin: left center;
  }
  .page.is-flipping {
    z-index: 150;
    transition: transform 1.05s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow:
      inset -12px 0 24px rgba(0,0,0,0.12),
      -18px 0 40px rgba(0,0,0,0.35);
  }
  .page.is-flipping .page-face {
    filter: brightness(0.97);
  }
  .page.flipped { transform: rotateY(-180deg); }

  .page-face {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    border-radius: 0 1px 1px 0;
  }
  .page.right-page .page-face {
    border-radius: 1px 0 0 1px;
  }
  .page-back {
    transform: rotateY(180deg);
  }

  /* SPINE */
  .spine {
    position: absolute;
    left: var(--page-w);
    top: 0;
    width: 5px;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.45), var(--spine-mid), rgba(0,0,0,0.35));
    z-index: 200;
    pointer-events: none;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
  }

  /* NAV CONTROLS */
  .nav {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 24px 40px 40px;
  }
  .nav-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--dark3);
    color: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.2s;
    user-select: none;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .dots {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dark4);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dot.active { background: var(--accent); border-color: var(--accent); }

  /* Sugerencia modo claro (solo tema oscuro) */
  .theme-nudge {
    position: fixed;
    bottom: 28px;
    right: 24px;
    z-index: 9999;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    max-width: min(360px, calc(100vw - 32px));
    padding: 14px 16px 14px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: linear-gradient(145deg, #1a1a24 0%, #12121a 100%);
    box-shadow: 0 20px 50px rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.92);
    font-size: 14px;
    line-height: 1.45;
    opacity: 0;
    transform: translateY(12px) scale(0.98);
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .theme-nudge.is-visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .theme-nudge-icon {
    font-size: 26px;
    line-height: 1;
    flex-shrink: 0;
  }
  .theme-nudge strong {
    display: block;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .theme-nudge p {
    margin: 0;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
  }
  .theme-nudge-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .theme-nudge-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .theme-nudge-cta {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #04120e;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .theme-nudge-cta:hover { filter: brightness(1.08); }
  .theme-nudge-close {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
  }
  .theme-nudge-close:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* =================== PAGE DESIGNS =================== */

  /* --- PORTADA --- */
  .pg-cover {
    background: var(--dark);
    display: flex;
    flex-direction: column;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .pg-cover .cover-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 110%, rgba(0,200,150,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,200,150,0.08) 0%, transparent 60%);
  }
  .pg-cover .cover-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .pg-cover .cover-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 48px 44px;
  }
  .pg-cover .cover-photo {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.22;
    mix-blend-mode: lighten;
  }
  html[data-theme="light"] .pg-cover .cover-photo {
    mix-blend-mode: multiply;
    opacity: 0.18;
  }
  .pg-cover .cover-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 6px;
    color: var(--white);
    margin-bottom: 4px;
    line-height: 1;
  }
  .pg-cover .cover-brand span { color: var(--accent); }
  .pg-cover .cover-division {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .cover-eyebrow {
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .cover-rule { width: 40px; height: 1px; background: var(--accent); margin-bottom: 24px; }
  .cover-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 76px;
    line-height: 0.88;
    color: var(--white);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .cover-title em { color: var(--accent); font-style: normal; }
  .cover-subtitle {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--muted);
    margin-bottom: auto;
  }
  .cover-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }
  .cover-tag {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
  }
  .cover-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .cover-year { font-family: 'Bebas Neue'; font-size: 48px; color: rgba(255,255,255,0.06); line-height: 1; }
  html[data-theme="light"] .cover-year { color: rgba(13,13,18,0.07); }
  .cover-cta {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  /* --- INTRO PAGE (right of cover) --- */
  .pg-intro {
    background: var(--dark2);
    padding: 48px 44px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
  }
  .pg-intro .section-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .pg-intro h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    line-height: 1.18;
    margin-bottom: 14px;
    color: var(--white);
  }
  .pg-intro p {
    font-size: 15px;
    line-height: 1.75;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .nivel-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .nivel-card {
    padding: 14px 18px;
    border-radius: 4px;
    border-left: 3px solid;
    background: rgba(255,255,255,0.03);
  }
  html[data-theme="light"] .nivel-card {
    background: rgba(0,0,0,0.04);
  }
  .nivel-card.n1 { border-color: var(--accent); }
  .nivel-card.n2 { border-color: #F5A623; }
  .nivel-card.n3 { border-color: #4A90E2; }
  .nivel-card.np { border-color: #E24A90; }
  .nivel-card .nv-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .nivel-card.n1 .nv-label { color: var(--accent); }
  .nivel-card.n2 .nv-label { color: #F5A623; }
  .nivel-card.n3 .nv-label { color: #4A90E2; }
  .nivel-card.np .nv-label { color: #E24A90; }
  .nivel-card .nv-title { font-size: 15px; font-weight: 500; color: var(--white); }
  .nivel-card .nv-items { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* --- GENERIC LEFT PRODUCT PAGE --- */
  .pg-product-left {
    background: var(--dark);
    padding: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .pl-accent-bar { height: 4px; width: 100%; flex-shrink: 0; }
  .pl-hero {
    width: 100%;
    height: 158px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .pl-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .pl-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, var(--dark));
  }
  html[data-theme="light"] .pl-hero::after {
    background: linear-gradient(to bottom, transparent 35%, var(--dark));
  }
  .pl-content { padding: 26px 40px 30px; display: flex; flex-direction: column; height: 0; flex: 1; min-height: 0; }
  .pl-eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
  .pl-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 0.9;
    color: var(--white);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .pl-title small {
    display: block;
    font-size: 26px;
    letter-spacing: 3px;
  }
  .pl-rule { height: 1px; background: var(--border); margin: 14px 0; }
  /* Primera ficha plan: título compacto para dejar aire a “Qué incluye” */
  .pl-tight-hero .pl-title {
    font-size: 44px;
    margin-bottom: 0;
    line-height: 0.86;
  }
  .pl-tight-hero .pl-title small {
    font-size: 22px;
    letter-spacing: 2px;
  }
  .pl-tight-hero .pl-rule { margin: 6px 0 8px; }
  .pl-tight-hero .pl-price-block { margin-bottom: 4px; }
  .pl-tight-hero .pl-price {
    font-size: 42px;
  }
  .pl-tight-hero .pl-objective {
    flex: 0 1 auto;
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.55;
  }
  .pl-tight-hero .pl-includes {
    margin-top: 8px;
    padding-bottom: 8px;
  }
  .pl-tight-hero .pl-checklist { gap: 5px; }
  .pl-tight-hero.pl-content { padding: 22px 40px 32px; }
  .pl-tight-hero .pl-hero { height: 128px; }

  .pl-price-block {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }
  .pl-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
  }
  .pl-price-suffix { font-size: 14px; color: var(--muted); }
  .pl-objective { font-size: 14px; line-height: 1.6; color: var(--muted); margin-bottom: 18px; flex: 0 1 auto; }
  .pl-includes { margin-top: 16px; }
  .pl-includes-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .pl-checklist { display: flex; flex-direction: column; gap: 8px; }
  .pl-check {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--checklist-fg);
  }
  .pl-check-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; }
  .pl-mockup {
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 180px;
    height: 240px;
    opacity: 0.12;
  }

  /* --- GENERIC RIGHT TECH PAGE --- */
  .pg-product-right {
    background: var(--dark2);
    padding: 42px 44px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    position: relative;
  }
  .pr-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
  .pr-timeline { display: flex; flex-direction: column; gap: 0; margin-bottom: 24px; }
  .pr-step { display: flex; gap: 16px; padding-bottom: 20px; position: relative; }
  .pr-step:last-child { padding-bottom: 0; }
  .pr-step-line {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .pr-step-num {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; font-size: 15px;
    flex-shrink: 0;
  }
  .pr-step-connector {
    width: 1px;
    flex: 1;
    min-height: 20px;
    background: var(--border);
    margin: 4px 0;
  }
  .pr-step:last-child .pr-step-connector { display: none; }
  .pr-step-body { flex: 1; }
  .pr-step-title { font-size: 14px; font-weight: 500; color: var(--white); margin-bottom: 4px; }
  .pr-step-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .pr-step-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .pr-tag { font-size: 11px; padding: 3px 8px; border-radius: 2px; letter-spacing: 0.5px; background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
  html[data-theme="light"] .pr-tag {
    background: rgba(0,0,0,0.055);
    color: rgba(13,13,18,0.78);
    border-color: rgba(13,13,18,0.12);
  }

  .pr-boxes { display: flex; flex-direction: column; gap: 10px; }

// ===== STATE =====
let currentSpread = 0;
const totalSpreads = spreads.length;
const FLIP_MS = 1050;
const THEME_KEY = 'movik-catalog-theme';
const THEME_NUDGE_MS = 120000;
let themeNudgeTimer = null;
let themeNudgeHideTimer = null;

// Zoom state
let currentZoom = 1;
let baseScale = 1;
const PAGE_W = 460;
const PAGE_H = 660;

function updateScale() {
  const wrapper = document.getElementById('book-wrapper');
  if (!wrapper) return;
  
  const ww = wrapper.clientWidth;
  const wh = wrapper.clientHeight;
  const bw = PAGE_W * 2;
  const bh = PAGE_H;
  
  const padding = 40;
  const scaleX = (ww - padding) / bw;
  const scaleY = (wh - padding) / bh;
  
  baseScale = Math.min(scaleX, scaleY, 1.5); 
  applyZoom();
}

function applyZoom() {
  const scaler = document.getElementById('book-scaler');
  const book = document.getElementById('book');
  if (!scaler || !book) return;
  
  const totalScale = baseScale * currentZoom;
  scaler.style.width = `${PAGE_W * 2 * totalScale}px`;
  scaler.style.height = `${PAGE_H * totalScale}px`;
  book.style.transform = `scale(${totalScale})`;
}

function zoomIn() { currentZoom += 0.25; applyZoom(); }
function zoomOut() { currentZoom = Math.max(0.5, currentZoom - 0.25); applyZoom(); }
function zoomFit() { currentZoom = 1; updateScale(); }

window.addEventListener('resize', updateScale);

function updateThemeToggleIcon() {
  const icon = document.getElementById('theme-toggle-icon');
  if (!icon) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  icon.textContent = isLight ? '🌙' : '☀️';
}

function hideThemeNudge() {
  const el = document.getElementById('theme-nudge');
  if (!el) return;
  el.classList.remove('is-visible');
  clearTimeout(themeNudgeHideTimer);
  themeNudgeHideTimer = setTimeout(() => {
    el.hidden = true;
    el.setAttribute('aria-hidden', 'true');
  }, 380);
}

function showThemeNudge() {
  if (document.documentElement.getAttribute('data-theme') === 'light') return;
  const el = document.getElementById('theme-nudge');
  if (!el) return;
  clearTimeout(themeNudgeHideTimer);
  el.hidden = false;
  el.removeAttribute('aria-hidden');
  requestAnimationFrame(() => el.classList.add('is-visible'));
  themeNudgeHideTimer = setTimeout(hideThemeNudge, 10000);
}

function startThemeNudgeTimer() {
  clearInterval(themeNudgeTimer);
  themeNudgeTimer = null;
  if (document.documentElement.getAttribute('data-theme') === 'light') return;
  themeNudgeTimer = setInterval(showThemeNudge, THEME_NUDGE_MS);
}

function stopThemeNudgeTimer() {
  clearInterval(themeNudgeTimer);
  themeNudgeTimer = null;
  const el = document.getElementById('theme-nudge');
  if (el) {
    el.classList.remove('is-visible');
    el.hidden = true;
    el.setAttribute('aria-hidden', 'true');
  }
  clearTimeout(themeNudgeHideTimer);
  themeNudgeHideTimer = null;
}

// ===== THEME =====
function applyTheme(theme) {
  const html = document.documentElement;
  const label = document.getElementById('theme-label');
  if (theme === 'light') {
    html.setAttribute('data-theme', 'light');
    if (label) label.textContent = 'oscuro';
    stopThemeNudgeTimer();
  } else {
    html.removeAttribute('data-theme');
    if (label) label.textContent = 'claro';
    startThemeNudgeTimer();
  }
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
  updateThemeToggleIcon();
}

function initTheme() {
  let t = 'dark';
  try { t = localStorage.getItem(THEME_KEY) || 'dark'; } catch (e) {}
  applyTheme(t === 'light' ? 'light' : 'dark');
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  applyTheme(isLight ? 'dark' : 'light');
}

// ===== RENDER =====
function ensureSpine(book) {
  if (!book.querySelector('.spine')) {
    const s = document.createElement('div');
    s.className = 'spine';
    book.insertBefore(s, book.firstChild);
  }
}

function updateDisplay() {
  const book = document.getElementById('book');
  ensureSpine(book);
  book.querySelectorAll('.page').forEach((el) => el.remove());

  const leftDiv = document.createElement('div');
  leftDiv.className = 'page';
  leftDiv.innerHTML = `<div class="page-face">${spreads[currentSpread].left}</div>`;

  const rightDiv = document.createElement('div');
  rightDiv.className = 'page right-page';
  rightDiv.innerHTML = `<div class="page-face">${spreads[currentSpread].right}</div>`;

  book.appendChild(leftDiv);
  book.appendChild(rightDiv);

  document.getElementById('pg-num').textContent = String(currentSpread + 1);
  document.getElementById('pg-total').textContent = String(totalSpreads);

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentSpread);
  });

  document.getElementById('prev-btn').disabled = currentSpread === 0;
  document.getElementById('next-btn').disabled = currentSpread === totalSpreads - 1;
}

function renderDots() {
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  spreads.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentSpread ? ' active' : '');
    dot.onclick = () => goToSpread(i);
    dots.appendChild(dot);
  });
}

function initBook() {
  const book = document.getElementById('book');
  book.innerHTML = '<div class="spine"></div>';
  currentSpread = 0;
  renderDots();
  updateDisplay();
  updateScale();
}

function turnPage(dir) {
  const newSpread = currentSpread + dir;
  if (newSpread < 0 || newSpread >= totalSpreads) return;

  const book = document.getElementById('book');
  const pages = book.querySelectorAll('.page');

  if (dir === 1) {
    const outPage = pages[1];
    if (!outPage) {
      currentSpread = newSpread;
      updateDisplay();
      renderDots();
      return;
    }
    outPage.classList.add('is-flipping');
    outPage.style.transform = 'rotateY(-180deg)';
    setTimeout(() => {
      outPage.classList.remove('is-flipping');
      outPage.style.transform = '';
      outPage.style.zIndex = '';
      currentSpread = newSpread;
      updateDisplay();
      renderDots();
    }, FLIP_MS);
  } else {
    currentSpread = newSpread;
    updateDisplay();
    renderDots();
  }
}

function goToSpread(index) {
  if (index < 0 || index >= totalSpreads || index === currentSpread) return;
  currentSpread = index;
  updateDisplay();
  renderDots();
}

function onBookWheel(e) {
  if (!e.target.closest('#book')) return;
  e.preventDefault();
  if (e.deltaY > 18) turnPage(1);
  else if (e.deltaY < -18) turnPage(-1);
}

function onStagePointerDown(e) {
  if (e.button !== 0) return;
  if (e.target.closest('a, button, input, textarea, select, .nav')) return;
  const book = document.getElementById('book');
  if (!book || !book.contains(e.target)) return;
  const br = book.getBoundingClientRect();
  const x = e.clientX;
  if (x < br.left || x > br.right) return;
  const rel = (x - br.left) / br.width;
  const edge = 0.1;
  if (rel < edge) turnPage(-1);
  else if (rel > 1 - edge) turnPage(1);
}

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') turnPage(1);
  if (e.key === 'ArrowLeft') turnPage(-1);
});

const stageEl = document.getElementById('stage');
stageEl.addEventListener('wheel', onBookWheel, { passive: false });
stageEl.addEventListener('mousedown', onStagePointerDown);

// Panning
let isDragging = false;
let startX, startY, scrollLeft, scrollTop;
const wrapper = document.getElementById('book-wrapper');
if (wrapper) {
  wrapper.addEventListener('mousedown', (e) => {
    if (e.target.closest('button') || e.target.closest('.nav')) return;
    isDragging = true;
    wrapper.style.cursor = 'grabbing';
    startX = e.pageX - wrapper.offsetLeft;
    startY = e.pageY - wrapper.offsetTop;
    scrollLeft = wrapper.scrollLeft;
    scrollTop = wrapper.scrollTop;
  });
  wrapper.addEventListener('mouseleave', () => {
    isDragging = false;
    wrapper.style.cursor = 'grab';
  });
  wrapper.addEventListener('mouseup', () => {
    isDragging = false;
    wrapper.style.cursor = 'grab';
  });
  wrapper.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.pageX - wrapper.offsetLeft;
    const y = e.pageY - wrapper.offsetTop;
    const walkX = (x - startX) * 1.5;
    const walkY = (y - startY) * 1.5;
    wrapper.scrollLeft = scrollLeft - walkX;
    wrapper.scrollTop = scrollTop - walkY;
  });
}

document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

document.getElementById('theme-nudge-close').addEventListener('click', hideThemeNudge);
document.getElementById('theme-nudge-cta').addEventListener('click', () => {
  applyTheme('light');
});

initTheme();
initBook();
</script>
